<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: #ffe6f0;
      overflow: hidden;
    }

    h1 {
      color: #ff4d88;
      font-size: 35px;
      margin-top: 100px;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 15px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }

    #yes {
      background-color: #ff4d88;
      color: white;
    }

    #no {
      position: absolute;
      background-color: grey;
      color: white;
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<h1 id="text">I have something to ask you... 💖</h1>

<div id="buttons" style="display:none;">
  <button id="yes" onclick="yes()">Yes 💖</button>
  <button id="no" onmouseover="move()">No 😭</button>
</div>

<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
let count = 3;

// Countdown logic
setTimeout(startCountdown, 2000);

function startCountdown() {
  const text = document.getElementById("text");

  let interval = setInterval(() => {
    if (count > 0) {
      text.innerHTML = count + "...";
      count--;
    } else {
      clearInterval(interval);
      text.innerHTML = "Will you be my girlfriend,Flora? 💖";
      document.getElementById("buttons").style.display = "block";
    }
  }, 1000);
}

// Yes button
function yes() {
  document.body.innerHTML = "<h1>I KNEW IT 😭💖💖💖</h1>";
}

// Impossible No button
function move() {
  const button = document.getElementById("no");
  button.style.top = Math.random() * window.innerHeight + "px";
  button.style.left = Math.random() * window.innerWidth + "px";
}

// Floating hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
